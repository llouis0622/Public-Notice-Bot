services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: public_notice_bot
      POSTGRES_USER: notice_user
      POSTGRES_PASSWORD: notice_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata: